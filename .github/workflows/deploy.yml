name: Deploy Website
on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NO_MKDOCS_2_WARNING: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Stable Dependencies
        run: |
          pip install "mkdocs>=1.5.0,<2.0.0" "mkdocs-material>=9.5.0,<10.0.0"

      # --- THIS IS THE FIX ---
      - name: Create virtual docs link
        run: ln -s . docs_link

      - name: Build and Deploy
        run: mkdocs gh-deploy --force